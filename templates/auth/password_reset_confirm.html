<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set New Password | ChessHub</title>
  {% load static %}
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
</head>

<style>
  .input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
}
</style>

<body class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

<div class="w-full max-w-md bg-white p-8 rounded-xl shadow-xl">
  <h2 class="text-2xl font-bold text-center mb-6">Set New Password</h2>

<form method="POST" class="space-y-5">
  {% csrf_token %}

  <div>
    <label>New Password</label>
    <input type="password" name="new_password1" required class="input">
  </div>

  <div>
    <label>Confirm Password</label>
    <input type="password" name="new_password2" required class="input">
  </div>

  <button class='w-full bg-black hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition' type="submit">Reset Password</button>
</form>

</div>

</body>
</html>
