<!DOCTYPE html>
<html>
<head>
  <title>Password Reset Complete</title>
  {% load static %}
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-linear-to-br from-gray-100 via-gray-200 to-gray-300 px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-200 p-8 text-center">

    <!-- Success Icon -->
    <div class="flex justify-center mb-4">
      <div class="w-14 h-14 flex items-center justify-center rounded-full bg-green-100">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M5 13l4 4L19 7" />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-green-600 mb-2">
      Password Reset Successful
    </h2>

    <!-- Message -->
    <p class="text-gray-600 mb-6">
      Your password has been updated.  
      You can now log in with your new password.
    </p>

    <!-- Button -->
    <a href="{% url 'auth' %}"
      class="inline-block w-full bg-black hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Go to Login
    </a>

  </div>

</body>
</html>
