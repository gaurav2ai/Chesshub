<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | ChessHub</title>
  {% load static %}
  <link href="{% static 'css/dist/styles.css' %}" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

<div class="w-full max-w-md bg-white p-8 rounded-xl shadow-xl">
  <h2 class="text-2xl font-bold text-center mb-2">Reset Password</h2>
  <p class="text-sm text-gray-600 text-center mb-6">
    Enter your registered email to receive a reset link.
  </p>

  <form method="POST" class="space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium mb-1">Email address</label>
      <input type="email" name="email" required
        class="w-full px-4 py-2 border border-gray-300 rounded-lg
               focus:ring-2 focus:ring-black focus:outline-none">
    </div>

    <button type="submit"
      class="w-full bg-black text-white py-2 rounded-lg font-semibold
             hover:bg-black/90 transition">
      Send Reset Link
    </button>
  </form>

  <p class="text-center text-sm mt-5">
    <a href="/" class="font-semibold text-black">Back to Login</a>
  </p>
</div>

</body>
</html>
