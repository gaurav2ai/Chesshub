<!-- templates/partials/sidebar.html -->
<aside
  class="w-72 bg-linear-to-b from-neutral-900 via-neutral-900 to-neutral-800 border-r border-neutral-700/60 p-6 hidden md:flex flex-col shadow-xl"
>
  <!-- LOGO -->
  <div class="flex items-center gap-3 mb-12">
    <div
      class="w-10 h-10 rounded-xl bg-purple-600/20 flex items-center justify-center"
    >
      <!-- chess icon -->
      <svg
        class="w-6 h-6 text-purple-400"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M8 21h8M12 17v4M7 4h10l-1 4H8L7 4z" />
      </svg>
    </div>
    <span class="text-xl font-semibold tracking-wide text-white">
      ChessHub
    </span>
  </div>

  <!-- NAV -->
  <nav class="text-sm space-y-2 flex-1">
    <!-- DASHBOARD -->
    <a
      href="{% url 'dashboard' %}"
      class="flex items-center gap-4 px-5 py-3 rounded-2xl {% if active_page == 'dashboard' %} bg-linear-to-r from-purple-600 to-purple-700 shadow-lg {% else %} hover:bg-neutral-800 {% endif %}"
    >
      Dashboard
    </a>

    <!-- BOOKINGS -->
    <div class="mt-6">
      <p class="px-5 text-xs uppercase tracking-widest text-neutral-400 mb-2">
        Bookings
      </p>

      <!-- Toggle -->
      <button
        id="bookingToggle"
        class="w-full flex items-center justify-between px-5 py-3 rounded-xl text-neutral-300 hover:bg-neutral-800 transition"
      >
        <div class="flex items-center gap-4">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
          Bookings
        </div>

        <svg
          id="bookingArrow"
          class="w-4 h-4 transition-transform"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>

      <!-- SUB MENU -->
      <div id="bookingMenu" class="ml-10 mt-2 space-y-1 hidden">
        <a
          href="{% url 'booking_calendar' %}"
          class="block px-4 py-2 rounded-xl {% if active_page == 'bookings' %} bg-purple-600 text-white {% else %} text-neutral-300 hover:bg-neutral-800 {% endif %}"
        >
          Book Your Tournament
        </a>

        <a
          href="{% url 'view_bookings' %}"
          class="block px-4 py-2 rounded-xl {% if active_page == 'view_bookings' %} bg-purple-600 text-white {% else %} text-neutral-300 hover:bg-neutral-800 {% endif %}"
        >
          View Tournaments
        </a>
      </div>
    </div>
  </nav>

  <!-- LOGOUT -->
  <a
    href="{% url 'logout' %}"
    class="flex items-center gap-4 px-5 py-3 rounded-xl text-red-400 hover:bg-red-600/10 transition"
  >
    <svg
      class="w-5 h-5"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
    >
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
      <path d="M16 17l5-5-5-5" />
      <path d="M21 12H9" />
    </svg>
    Logout
  </a>
</aside>

<script>
  const toggle = document.getElementById("bookingToggle");
  const menu = document.getElementById("bookingMenu");
  const arrow = document.getElementById("bookingArrow");

  toggle.onclick = () => {
    menu.classList.toggle("hidden");
    arrow.classList.toggle("rotate-180");
  };
</script>
