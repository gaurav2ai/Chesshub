{% extends "base.html" %}
{% block title %}Payment Successful | ChessHub{% endblock %}
{% block content %}

<div class="min-h-[60vh] flex items-center justify-center">
  <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-10 text-center max-w-md">

    <div class="mx-auto w-20 h-20 rounded-full bg-green-600/20 flex items-center justify-center mb-6">
      <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24">
        <path d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold mb-2">Payment Successful</h1>
    <p class="text-neutral-400 mb-8">
      Your tournament booking has been confirmed
    </p>

    <div class="space-y-4">
      <a href="{% url 'view_bookings' %}"
        class="block w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-semibold">
        View My Bookings
      </a>

      <a href="{% url 'dashboard' %}"
        class="block w-full bg-neutral-800 hover:bg-neutral-700 text-white py-3 rounded-xl">
        Go to Dashboard
      </a>
    </div>

  </div>
</div>

{% endblock %}
